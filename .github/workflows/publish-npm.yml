name: Publish npm Package

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Parse release tag
        id: release-tag
        if: github.event_name != 'workflow_dispatch'
        env:
          TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const tag = process.env.TAG_NAME ?? "";
          const match = /^v(\d+)\.(\d+)\.(\d+)$/.exec(tag);
          if (!match) {
            console.error(`Release tag ${tag} must match v1.2.3.`);
            process.exit(1);
          }

          const version = `${match[1]}.${match[2]}.${match[3]}`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tag}\nversion=${version}\n`);
          NODE

      - name: Validate package version
        if: github.event_name != 'workflow_dispatch'
        env:
          TAG_NAME: ${{ steps.release-tag.outputs.tag }}
          TAG_VERSION: ${{ steps.release-tag.outputs.version }}
        run: |
          node <<'NODE'
          const pkg = require("./package.json");
          const tag = process.env.TAG_NAME;
          const version = process.env.TAG_VERSION;

          if (pkg.version !== version) {
            console.error(`Release tag ${tag} resolves to ${version}, but package.json version is ${pkg.version}.`);
            process.exit(1);
          }
          NODE

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack smoke test
        run: npm pack --dry-run

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes --verify-tag
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}

      - name: Publish
        run: npm publish --access public
